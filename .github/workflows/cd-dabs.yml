name: CD DABs

on:
  push:
    branches:
      - main
  schedule:
    # Weekly drift check: catches breakage from new CLI/runtime/dependency releases without a merge
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Serialize CD runs: they deploy the same bundle to the shared Databricks workspace.
concurrency:
  group: databricks-shared-workspace
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  deploy-and-run-example-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v1.8.0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Create init parameters JSON
        run: |
          echo '{
            "project_name": "revo-dabs-test-project",
            "project_description": "This project is generated using our own RevoData Declarative Automation Bundle Templates.",
            "author": "Thomas Brouwer",
            "email": "thomas.brouwer@revodata.nl",
            "setup_type": "default"
          }' > init_params.json

      - name: Initialize Declarative Automation Bundle from template
        run: |
          echo "Rendering template from commit $GITHUB_SHA"
          databricks bundle init "$GITHUB_WORKSPACE" --config-file init_params.json
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Deploy Declarative Automation Bundle
        run: |
          cd revo-dabs-test-project
          echo ""
          echo "=================================================================="
          echo "======================== DEPLOY BUNDLE ==========================="
          echo "=================================================================="
          databricks bundle deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Run example job
        run: |
          cd revo-dabs-test-project
          echo ""
          echo "=================================================================="
          echo "======================== RUN EXAMPLE JOB ========================="
          echo "=================================================================="
          echo "Starting 'example-job'... (this may take a while)"
          databricks bundle run example-job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Run example pipeline job
        run: |
          cd revo-dabs-test-project
          echo ""
          echo "=================================================================="
          echo "================ RUN EXAMPLE PIPELINE JOB ========================"
          echo "=================================================================="
          echo "Starting 'example-pipeline-job'... (this may take a while)"
          databricks bundle run example-pipeline-job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      # Destroy bundle regardless of the outcome of the deploy and runs
      - name: Destroy Bundle
        if: always()
        run: |
          if [ ! -d revo-dabs-test-project ]; then
            echo "Nothing to destroy: bundle was never initialized"
            exit 0
          fi
          cd revo-dabs-test-project
          echo ""
          echo "=================================================================="
          echo "======================== DESTROY BUNDLE =========================="
          echo "=================================================================="
          databricks bundle destroy --auto-approve
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "CD DABs failed: run #${{ github.run_number }} on ${{ github.ref_name }}" \
            --assignee thms317 \
            --body "Post-merge verification of the deployed example jobs failed for commit ${{ github.sha }} (trigger: ${{ github.event_name }}). See the run logs: $RUN_URL"
